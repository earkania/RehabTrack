name: rehab_track
description: "RehabTrack — Personal Health Companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # Navigation
  go_router: ^14.8.1

  # Localization
  intl: ^0.20.2

  # File Storage
  path_provider: ^2.1.5
  path: ^1.9.1

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  json_serializable: ^6.9.2
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
  generate: true
